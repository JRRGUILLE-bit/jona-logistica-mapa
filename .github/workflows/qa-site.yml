name: Site QA

on:
  push:
    branches:
      - main
    paths:
      - "**/*.html"
      - "**/*.css"
      - "**/*.js"
      - "**/*.webmanifest"
      - "assets/**"
      - "scripts/qa_*.py"
      - ".github/workflows/qa-site.yml"
  pull_request:
    paths:
      - "**/*.html"
      - "**/*.css"
      - "**/*.js"
      - "**/*.webmanifest"
      - "assets/**"
      - "scripts/qa_*.py"
      - ".github/workflows/qa-site.yml"
  schedule:
    - cron: "10 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: site-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: Static site QA
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Apply deterministic QA fixes
        if: github.event_name == 'push'
        run: python scripts/qa_apply.py

      - name: Check Python syntax
        run: python -m py_compile scripts/qa_check.py scripts/qa_apply.py

      - name: Check JavaScript syntax
        run: |
          node --check offline.js
          node --check service-worker.js

      - name: Run site QA
        run: python scripts/qa_check.py

      - name: Reject whitespace errors
        run: git diff --check

      - name: Commit normalized site files
        if: github.event_name == 'push'
        run: |
          if git diff --quiet; then
            echo "No QA fixes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html 404.html clima/index.html movilidad/index.html supermercados/index.html docs/index.html apps/index.html discord/index.html offline.js manifest.webmanifest service-worker.js
          git commit -m "Apply automated site QA fixes"
          git push

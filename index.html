<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#07151d">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
<meta name="description" content="Centro de logística del rodaje de Jona: clima, movilidad del crew y acceso rápido a supermercados y farmacias.">
<link rel="canonical" href="https://jrrguille-bit.github.io/jona-logistica-mapa/">
<meta property="og:title" content="Jona Logística">
<meta property="og:description" content="Clima de rodaje, movilidad, supermercados y farmacias en un único centro logístico de producción.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://jrrguille-bit.github.io/jona-logistica-mapa/">
<title>Jona Logística</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Oswald:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  color-scheme:dark;
  --ink:#f5f0e8;
  --muted:#c1c8c7;
  --accent:#dc9140;
  --accent-soft:rgba(220,145,64,.18);
  --panel:rgba(5,18,25,.72);
  --line:rgba(220,145,64,.72);
  --focus:#ffd18f;
}
*{box-sizing:border-box}
html{min-height:100%;background:#07151d}
body{
  margin:0;
  min-height:100svh;
  overflow-x:hidden;
  position:relative;
  isolation:isolate;
  color:var(--ink);
  font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#07151d;
}
body:before{
  content:"";
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  background:url("b16f4d42-4937-42be-839e-e54647e64100.png") center/cover no-repeat;
  filter:contrast(1.12) brightness(1.12);
  transform:scale(1.012);
}
body:after{
  content:"";
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  background:
    radial-gradient(circle at 50% 48%,rgba(6,19,27,.02) 0,rgba(6,19,27,.12) 48%,rgba(3,12,17,.32) 100%),
    linear-gradient(180deg,rgba(4,14,20,.04),rgba(4,14,20,.16));
}
.shell{
  position:relative;
  z-index:1;
  width:min(100%,1120px);
  min-height:100svh;
  margin:0 auto;
  padding:max(32px,env(safe-area-inset-top)) clamp(20px,5vw,64px) max(28px,env(safe-area-inset-bottom));
  display:grid;
  place-items:center;
}
.hero{
  width:min(100%,760px);
  text-align:center;
  animation:arrive .7s cubic-bezier(.2,.8,.2,1) both;
}
.eyebrow{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  margin:0 0 20px;
  color:var(--accent);
  font-family:Oswald,Impact,sans-serif;
  font-size:clamp(13px,1.5vw,17px);
  font-weight:500;
  letter-spacing:.38em;
  text-transform:uppercase;
}
.eyebrow:before,.eyebrow:after{
  content:"";
  width:38px;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--accent));
}
.eyebrow:after{background:linear-gradient(90deg,var(--accent),transparent)}
h1{
  margin:0 0 clamp(34px,6vh,58px);
  font-family:Oswald,Impact,"Arial Narrow",sans-serif;
  font-size:clamp(62px,10vw,116px);
  font-weight:500;
  line-height:.9;
  letter-spacing:.035em;
  text-transform:uppercase;
  text-shadow:0 8px 36px rgba(0,0,0,.46);
}
h1 span{display:block}
h1 strong{
  display:block;
  font-weight:400;
  letter-spacing:.18em;
  margin-right:-.18em;
  color:#e9e5de;
}
.actions{
  width:min(100%,670px);
  margin:0 auto;
  display:grid;
  gap:16px;
}
.action{
  position:relative;
  width:100%;
  min-height:112px;
  padding:18px 62px 18px 22px;
  display:grid;
  grid-template-columns:78px minmax(0,1fr);
  align-items:center;
  gap:20px;
  border:1px solid var(--line);
  border-radius:10px;
  background:linear-gradient(135deg,rgba(4,17,24,.84),rgba(8,24,32,.68));
  color:var(--ink);
  box-shadow:0 20px 54px rgba(0,0,0,.22),inset 0 1px rgba(255,255,255,.025);
  backdrop-filter:blur(12px);
  text-decoration:none;
  text-align:left;
  transition:border-color .2s ease,transform .2s ease,background .2s ease,box-shadow .2s ease;
}
a.action:hover{
  transform:translateY(-3px);
  border-color:var(--accent);
  background:linear-gradient(135deg,rgba(15,32,39,.94),rgba(9,25,33,.84));
  box-shadow:0 24px 60px rgba(0,0,0,.32),0 0 0 1px var(--accent-soft);
}
.action:focus-visible{outline:3px solid var(--focus);outline-offset:5px}
.action-icon{
  width:72px;
  height:72px;
  display:grid;
  place-items:center;
  border-right:1px solid rgba(255,255,255,.18);
  color:var(--accent);
}
.action-icon svg{width:48px;height:48px;stroke:currentColor}
.action-copy{min-width:0}
.action-title{
  display:block;
  font-family:Oswald,Impact,sans-serif;
  font-size:clamp(23px,3.3vw,34px);
  font-weight:500;
  line-height:1.08;
  letter-spacing:.055em;
  text-transform:uppercase;
}
.action-meta{
  display:block;
  margin-top:8px;
  color:var(--accent);
  font-family:Oswald,Impact,sans-serif;
  font-size:13px;
  font-weight:500;
  letter-spacing:.24em;
  text-transform:uppercase;
}
.arrow{
  position:absolute;
  right:24px;
  top:50%;
  width:15px;
  height:15px;
  border-top:2px solid var(--accent);
  border-right:2px solid var(--accent);
  transform:translateY(-50%) rotate(45deg);
  transition:transform .2s ease;
}
a.action:hover .arrow{transform:translate(4px,-50%) rotate(45deg)}
button.action{
  appearance:none;
  font:inherit;
  opacity:.68;
  cursor:not-allowed;
}
button.action .action-meta{color:var(--muted)}
button.action .arrow{opacity:.32}
.status{
  position:absolute;
  top:12px;
  right:14px;
  padding:5px 8px;
  border:1px solid rgba(255,255,255,.14);
  border-radius:999px;
  color:rgba(255,255,255,.6);
  font-size:9px;
  font-weight:700;
  letter-spacing:.14em;
  text-transform:uppercase;
}
@keyframes arrive{
  from{opacity:0;transform:translateY(18px)}
  to{opacity:1;transform:translateY(0)}
}
@media(max-width:620px){
  body:before{background-position:center center}
  body:after{background:linear-gradient(180deg,rgba(3,13,19,.16),rgba(3,13,19,.36))}
  .shell{padding-left:16px;padding-right:16px}
  .eyebrow{letter-spacing:.24em}
  h1{font-size:clamp(56px,19vw,82px);margin-bottom:36px}
  h1 strong{letter-spacing:.12em;margin-right:-.12em}
  .action{
    min-height:100px;
    grid-template-columns:58px minmax(0,1fr);
    gap:15px;
    padding:15px 44px 15px 14px;
    border-radius:9px;
  }
  .action-icon{width:58px;height:62px}
  .action-icon svg{width:39px;height:39px}
  .action-title{font-size:clamp(21px,6.2vw,28px)}
  .action-meta{font-size:10px;letter-spacing:.18em}
  .arrow{right:17px}
  .status{top:8px;right:10px;font-size:8px}
}
@media(prefers-reduced-motion:reduce){
  .hero{animation:none}
  .action,.arrow{transition:none}
}
</style>
</head>
<body>
<main class="shell">
  <section class="hero" aria-labelledby="page-title">
    <p class="eyebrow">Producción Jona</p>
    <h1 id="page-title"><span>Jona</span><strong>Logística</strong></h1>
    <nav class="actions" aria-label="Secciones de logística">
      <a class="action" href="clima/">
        <span class="action-icon" aria-hidden="true">
          <svg viewBox="0 0 64 64" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="30" cy="29" r="11"></circle>
            <path d="M30 7v7M30 44v7M8 29h7M45 29h7M14.5 13.5l5 5M40.5 39.5l5 5M45.5 13.5l-5 5M19.5 39.5l-5 5"></path>
            <path d="M34 47h15a8 8 0 0 0 0-16 13 13 0 0 0-24-4"></path>
          </svg>
        </span>
        <span class="action-copy">
          <span class="action-title">Pronóstico del clima</span>
          <span class="action-meta">MetSul · INUMET · Modelos</span>
        </span>
        <span class="arrow" aria-hidden="true"></span>
      </a>
      <a class="action" href="movilidad/">
        <span class="action-icon" aria-hidden="true">
          <svg viewBox="0 0 64 64" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 39l4-14c1-4 4-6 8-6h16c4 0 7 2 8 6l4 14"></path>
            <path d="M9 39h46v10H9z"></path>
            <path d="M18 29h28"></path>
            <circle cx="19" cy="49" r="4"></circle>
            <circle cx="45" cy="49" r="4"></circle>
            <path d="M6 32h7M51 32h7"></path>
          </svg>
        </span>
        <span class="action-copy">
          <span class="action-title">Movilidad del crew</span>
          <span class="action-meta">Autos · Conductores · Pasajeros</span>
        </span>
        <span class="arrow" aria-hidden="true"></span>
      </a>
      <a class="action" href="supermercados/">
        <span class="action-icon" aria-hidden="true">
          <svg viewBox="0 0 64 64" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 11h7l6 29h29l7-20H16"></path>
            <circle cx="25" cy="50" r="3"></circle>
            <circle cx="46" cy="50" r="3"></circle>
            <path d="M42 8v16M34 16h16"></path>
          </svg>
        </span>
        <span class="action-copy">
          <span class="action-title">Supermercados y farmacias</span>
          <span class="action-meta">Segundo fin de semana</span>
        </span>
        <span class="arrow" aria-hidden="true"></span>
      </a>
    </nav>
  </section>
</main>
</body>
</html>

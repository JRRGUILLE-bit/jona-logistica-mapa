<link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
<meta name="description" content="Acceso al Discord de producción de Jona tenía 15 años.">
<link rel="canonical" href="https://jrrguille-bit.github.io/jona-logistica/discord/">
<meta property="og:title" content="Discord — Jona Logística">
<meta property="og:description" content="Acceso y descargas para la comunicación del equipo de producción.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://jrrguille-bit.github.io/jona-logistica/discord/">
<title>Discord — Jona Logística</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Oswald:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../site-touchup.css?v=20260723-2">
<style>
:root{color-scheme:dark;--bg:#061827;--ink:#f5f0e8;--muted:#aebbc4;--accent:#7889ea;--accent-strong:#9aa7ff;--line:rgba(120,137,234,.52);--hair:rgba(255,255,255,.11);--focus:#cbd2ff;--shadow:0 24px 68px rgba(0,0,0,.38)}
*{box-sizing:border-box}html{min-height:100%;background:var(--bg)}body{margin:0;min-height:100vh;position:relative;isolation:isolate;overflow-x:hidden;color:var(--ink);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg)}
body:before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:url("../assets/site-bg-1600.webp") center/cover no-repeat;filter:contrast(1.08) brightness(.52) saturate(.68);transform:scale(1.012)}
body:after{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(circle at 78% 12%,rgba(120,137,234,.16),transparent 32%),linear-gradient(180deg,rgba(2,13,21,.54),rgba(2,13,21,.94))}
a{color:inherit}.page{position:relative;z-index:1;width:min(900px,100%);margin:0 auto;padding:94px 22px 48px}.home-link{position:fixed;z-index:20;top:20px;left:20px;display:inline-flex;align-items:center;min-height:44px;padding:10px 16px;border:1px solid var(--line);border-radius:999px;background:rgba(4,20,32,.88);text-decoration:none;font-family:Oswald,Impact,sans-serif;font-size:14px;letter-spacing:.07em;text-transform:uppercase;box-shadow:0 12px 30px rgba(0,0,0,.32)}
.hero{position:relative;overflow:hidden;padding:clamp(30px,6vw,62px);border:1px solid var(--line);border-radius:20px;background:linear-gradient(135deg,rgba(4,19,31,.96),rgba(24,31,68,.78));box-shadow:var(--shadow)}.eyebrow{display:flex;align-items:center;gap:11px;margin:0 0 14px;color:var(--accent-strong);font-family:Oswald,Impact,sans-serif;font-size:12px;letter-spacing:.24em;text-transform:uppercase}.eyebrow:before{content:"";width:30px;height:1px;background:currentColor}h1{margin:0;font-family:Oswald,Impact,sans-serif;font-size:clamp(58px,10vw,96px);font-weight:500;line-height:.92;letter-spacing:.035em;text-transform:uppercase}.intro{max-width:680px;margin:19px 0 0;color:var(--muted);font-size:14px;line-height:1.65}
.panel{margin-top:20px;padding:24px;border:1px solid var(--hair);border-radius:18px;background:linear-gradient(145deg,rgba(5,23,35,.94),rgba(20,28,62,.80));box-shadow:var(--shadow)}.status{display:inline-flex;padding:7px 10px;border:1px solid rgba(232,173,81,.38);border-radius:999px;background:rgba(232,173,81,.09);color:#ffe0aa;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase}.panel h2{margin:16px 0 0;font-family:Oswald,Impact,sans-serif;font-size:34px;font-weight:500;letter-spacing:.035em;text-transform:uppercase}.panel p{margin:9px 0 0;color:var(--muted);font-size:12px;line-height:1.55}.invite-button{width:100%;min-height:52px;margin-top:20px;border:1px solid rgba(120,137,234,.42);border-radius:12px;background:rgba(120,137,234,.12);color:rgba(245,240,232,.55);font-family:Oswald,Impact,sans-serif;font-size:16px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;cursor:not-allowed}.store-row{display:flex;flex-wrap:wrap;gap:9px;margin-top:20px}.store-button{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:10px 15px;border:1px solid rgba(255,255,255,.16);border-radius:999px;background:rgba(2,15,24,.52);text-decoration:none;font-size:10px;font-weight:700;letter-spacing:.07em}.store-button:hover{border-color:var(--accent-strong)}
.site-footer{margin:28px 4px 0;padding:20px 16px 0;border-top:1px solid var(--hair);color:rgba(245,240,232,.66);text-align:center}.copyright{margin:0;font-family:Oswald,Impact,sans-serif;font-size:10px;letter-spacing:.15em;text-transform:uppercase}.producer{margin:9px 0 0}.instagram-link{margin-left:7px}
@media(max-width:760px){.page{padding:80px 15px 38px}.home-link{top:12px;left:12px}.hero{padding:30px 22px;border-radius:16px}.panel{padding:19px}.store-button{flex:1 1 130px}}
</style>
</head>
<body>
<a class="home-link" href="../" aria-label="Volver al inicio"><span class="home-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"></path><path d="M8 12h10"></path></svg></span><span>Inicio</span></a>

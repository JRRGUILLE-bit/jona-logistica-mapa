''', encoding='utf-8')
          PY

      - name: Commit site update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html home.css site-touchup.css apps/index.html docs/index.html movilidad/index.html supermercados/index.html discord/index.html
          git diff --cached --quiet && exit 0
          git commit -m "Add next shoot summary and Discord section"
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            sleep 3
          done
          exit 1

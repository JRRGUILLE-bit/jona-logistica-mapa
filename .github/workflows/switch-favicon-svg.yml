name: Switch to SVG favicon

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/switch-favicon-svg.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prioritize the larger SVG favicon
        run: |
          python - <<'PY'
          from pathlib import Path

          for path in Path('.').rglob('*.html'):
              text = path.read_text(encoding='utf-8')
              updated = text.replace('favicon.ico" sizes="any"', 'favicon.svg?v=3" type="image/svg+xml" sizes="any"')
              if updated != text:
                  path.write_text(updated, encoding='utf-8')
                  print(f'updated {path}')
          PY

      - name: Commit SVG favicon references
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- '*.html'
          if git diff --cached --quiet; then
            echo "No HTML changes required."
            exit 0
          fi
          git commit -m "Use larger SVG favicon across site"
          git push

name: Add operational homepage and Discord

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/add-operational-home-and-discord.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update production site
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          repo = Path('.')

          # Shared metadata and sixth homepage color.
          touch = repo / 'site-touchup.css'
          css = touch.read_text(encoding='utf-8')
          additions = '''

/* Estado editorial de la información operativa */
.page-meta{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:9px;
  margin:22px 4px 0;
  color:rgba(245,240,232,.58);
  font-size:10px;
  font-weight:600;
  letter-spacing:.055em;
  line-height:1.45;
  text-align:center;
  text-transform:uppercase;
}
.page-meta:before{
  content:"";
  width:7px;
  height:7px;
  flex:0 0 auto;
  border-radius:50%;
  background:var(--accent,#dc9140);
  box-shadow:0 0 0 4px rgba(220,145,64,.09);
}
.action:nth-child(6){--card-accent:#7889ea}
@media(max-width:760px){.page-meta{align-items:flex-start;font-size:9px}.page-meta:before{margin-top:3px}}
'''
          if '/* Estado editorial de la información operativa */' not in css:
              touch.write_text(css.rstrip() + additions + '\n', encoding='utf-8')

          # Homepage: dynamic next-shoot strip, Discord section and cache bump.
          path = repo / 'index.html'
          html = path.read_text(encoding='utf-8')
          html = html.replace('home.css?v=20260723-2', 'home.css?v=20260723-3')
          html = html.replace('site-touchup.css?v=20260723-1', 'site-touchup.css?v=20260723-2')

          next_block = '''

    <section class="next-shoot" aria-labelledby="next-shoot-title">
      <div class="next-shoot-icon" aria-hidden="true"><svg viewBox="0 0 32 32"><rect x="5" y="7" width="22" height="20" rx="3"></rect><path d="M10 4v6M22 4v6M5 13h22"></path><path d="M11 19h4M18 19h3M11 24h3"></path></svg></div>
      <div class="next-shoot-copy">
        <span class="next-shoot-kicker">Próxima jornada</span>
        <strong id="nextShootTitle">Cargando…</strong>
        <span id="nextShootDetail">Consultando el calendario de rodaje.</span>
      </div>
      <div class="next-shoot-actions">
        <a id="nextShootPrimary" href="docs/">Ver jornada</a>
        <a href="clima/">Ver clima</a>
      </div>
    </section>
    <p class="page-meta"><span>Actualizado 23/07/2026 · Responsable: Producción</span></p>
'''
          if 'class="next-shoot"' not in html:
              html = html.replace('    </h1>\n\n    <nav class="actions"', '    </h1>' + next_block + '\n    <nav class="actions"', 1)

          discord_card = '''

      <a class="action" href="discord/">
        <span class="action-icon" aria-hidden="true">
          <svg viewBox="0 0 64 64"><path d="M16 17c10-6 22-6 32 0l6 30c-8 6-14 8-18 8l-4-6-4 6c-4 0-10-2-18-8z"></path><circle cx="25" cy="35" r="3"></circle><circle cx="39" cy="35" r="3"></circle><path d="M23 43c6 4 12 4 18 0"></path></svg>
        </span>
        <span class="action-copy"><span class="action-kicker">Comunicación</span><span class="action-title">Discord</span><span class="action-description">Acceso al servidor y descarga de la aplicación.</span></span>
        <span class="arrow" aria-hidden="true"></span>
      </a>
'''
          if 'href="discord/"' not in html:
              html = html.replace('    </nav>', discord_card + '    </nav>', 1)

          script = '''
<script>
(()=>{
  const jornadas=[
    {date:'2026-07-25',title:'Sábado 25 de julio',detail:'07:00 · Taller · Ciudad de la Costa',href:'movilidad/#dia-1',label:'Ver movilidad'},
    {date:'2026-07-26',title:'Domingo 26 de julio',detail:'13:00 · Plaza La Paz',href:'movilidad/#dia-2',label:'Ver movilidad'},
    {date:'2026-08-01',title:'Sábado 1 de agosto',detail:'Consultar citaciones y plan de rodaje',href:'docs/',label:'Ver Docs'},
    {date:'2026-08-02',title:'Domingo 2 de agosto',detail:'Consultar citaciones y plan de rodaje',href:'docs/',label:'Ver Docs'}
  ];
  const now=new Date();
  const today=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const next=jornadas.find(item=>item.date>=today);
  const title=document.getElementById('nextShootTitle');
  const detail=document.getElementById('nextShootDetail');
  const primary=document.getElementById('nextShootPrimary');
  if(!title||!detail||!primary)return;
  if(next){title.textContent=next.title;detail.textContent=next.detail;primary.href=next.href;primary.textContent=next.label;}
  else{title.textContent='Rodaje finalizado';detail.textContent='Las jornadas previstas ya concluyeron.';primary.href='docs/';primary.textContent='Ver Docs';}
})();
</script>
'''
          if 'const jornadas=[' not in html:
              html = html.replace('</body>', script + '</body>', 1)
          path.write_text(html, encoding='utf-8')

          # Homepage styles.
          path = repo / 'home.css'
          css = path.read_text(encoding='utf-8')
          home_additions = '''

/* Próxima jornada */
.next-shoot{
  width:100%;
  margin:24px auto 0;
  padding:15px 17px;
  display:grid;
  grid-template-columns:48px minmax(0,1fr) auto;
  align-items:center;
  gap:15px;
  border:1px solid rgba(220,145,64,.34);
  border-radius:15px;
  background:linear-gradient(145deg,rgba(4,18,27,.90),rgba(8,29,39,.76));
  box-shadow:0 16px 42px rgba(0,0,0,.25),inset 0 1px rgba(255,255,255,.035);
  text-align:left;
}
.next-shoot-icon{width:46px;height:46px;display:grid;place-items:center;border:1px solid rgba(220,145,64,.42);border-radius:13px;background:rgba(220,145,64,.09);color:var(--accent-strong)}
.next-shoot-icon svg{width:25px;height:25px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.next-shoot-copy{min-width:0}
.next-shoot-kicker{display:block;margin-bottom:4px;color:var(--accent);font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase}
.next-shoot-copy strong{display:block;font-family:Oswald,Impact,sans-serif;font-size:23px;font-weight:500;line-height:1.05;letter-spacing:.035em;text-transform:uppercase}
.next-shoot-copy>span:last-child{display:block;margin-top:5px;color:var(--muted);font-size:11px;line-height:1.4}
.next-shoot-actions{display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-wrap:wrap}
.next-shoot-actions a{min-height:36px;padding:9px 12px;display:inline-flex;align-items:center;justify-content:center;border:1px solid rgba(220,145,64,.40);border-radius:999px;background:rgba(2,15,24,.50);color:var(--ink);font-size:9px;font-weight:700;letter-spacing:.08em;text-decoration:none;text-transform:uppercase;transition:transform .17s ease,border-color .17s ease,background .17s ease}
.next-shoot-actions a:hover{transform:translateY(-2px);border-color:var(--accent-strong);background:rgba(9,38,55,.90)}
.hero>.page-meta{margin:12px 0 0}
@media(max-width:760px){
  .next-shoot{grid-template-columns:44px minmax(0,1fr);padding:14px;gap:12px}
  .next-shoot-icon{width:42px;height:42px;border-radius:11px}
  .next-shoot-copy strong{font-size:21px}
  .next-shoot-actions{grid-column:1/-1;justify-content:stretch}
  .next-shoot-actions a{flex:1 1 120px}
}
'''
          if '/* Próxima jornada */' not in css:
              path.write_text(css.rstrip() + home_additions + '\n', encoding='utf-8')

          # Apps: move Discord out and add editorial metadata.
          path = repo / 'apps/index.html'
          html = path.read_text(encoding='utf-8')
          html = re.sub(r'\s*<article class="tool-card communication">.*?</article>', '', html, count=1, flags=re.S)
          if 'Actualizado 23/07/2026 · Responsable: Producción técnica' not in html:
              html = html.replace('  <footer class="site-footer">', '  <p class="page-meta"><span>Actualizado 23/07/2026 · Responsable: Producción técnica</span></p>\n\n  <footer class="site-footer">', 1)
          html = html.replace('site-touchup.css?v=20260723-1', 'site-touchup.css?v=20260723-2')
          path.write_text(html, encoding='utf-8')

          # Docs metadata.
          path = repo / 'docs/index.html'
          html = path.read_text(encoding='utf-8')
          if 'Actualizado 23/07/2026 · Responsable: Producción' not in html:
              html = html.replace('  <p class="note">', '  <p class="page-meta"><span>Actualizado 23/07/2026 · Responsable: Producción</span></p>\n\n  <p class="note">', 1)
          html = html.replace('site-touchup.css?v=20260723-1', 'site-touchup.css?v=20260723-2')
          path.write_text(html, encoding='utf-8')

          # Mobility metadata.
          path = repo / 'movilidad/index.html'
          html = path.read_text(encoding='utf-8')
          if 'Actualizado 23/07/2026 · Responsable: Producción' not in html:
              html = html.replace('</main>', '<p class="page-meta"><span>Actualizado 23/07/2026 · Responsable: Producción</span></p>\n</main>', 1)
          html = html.replace('site-touchup.css?v=20260723-1', 'site-touchup.css?v=20260723-2')
          path.write_text(html, encoding='utf-8')

          # Shopping metadata.
          path = repo / 'supermercados/index.html'
          html = path.read_text(encoding='utf-8')
          if 'Actualizado 23/07/2026 · Responsable: Producción' not in html:
              html = html.replace('<footer>Confirmar horarios antes de salir.</footer>', '<p class="page-meta"><span>Actualizado 23/07/2026 · Responsable: Producción</span></p>\n<footer>Confirmar horarios antes de salir.</footer>', 1)
          html = html.replace('site-touchup.css?v=20260723-1', 'site-touchup.css?v=20260723-2')
          path.write_text(html, encoding='utf-8')

          # Discord standalone section with inactive invitation placeholder.
          discord = repo / 'discord'
          discord.mkdir(exist_ok=True)
          (discord / 'index.html').write_text('''<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#061827">
